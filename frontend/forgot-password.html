<!DOCTYPE html>
<html>
<head>
  <title>AuthAPI Forgot Password</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }

    body {
      min-height: 100vh;
      background: #e8eaf0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Main card ── */
    .card {
      display: flex;
      width: 100%;
      max-width: 960px;
      min-height: 580px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.12);
    }

    /* ── LEFT panel ── */
    .left {
      flex: 1;
      padding: 52px 52px 44px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 40px;
    }

    .brand-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }

    .brand-icon svg { width: 18px; height: 18px; fill: white; }
    .brand-name { font-size: 16px; font-weight: 700; color: #111827; }

    .left h2 {
      font-size: 26px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .left .sub {
      font-size: 13.5px;
      color: #9ca3af;
      margin-bottom: 28px;
    }

    /* Social buttons */
    .socials {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      background: #fff;
      font-size: 13.5px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-decoration: none;
    }

    .social-btn:hover { border-color: #d1d5db; background: #f9fafb; }
    .social-btn svg { width: 18px; height: 18px; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      color: #d1d5db;
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: #f3f4f6;
    }

    /* Fields */
    .field { margin-bottom: 14px; }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: #9ca3af;
      display: flex;
    }

    .input-icon svg { width: 16px; height: 16px; }

    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      color: #111827;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: #9ca3af; }

    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .pw-toggle {
      position: absolute; right: 12px;
      background: none; border: none;
      color: #9ca3af; cursor: pointer;
      padding: 4px; display: flex;
      width: auto; margin: 0;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .pw-toggle:hover { color: #6b7280; }
    .pw-toggle svg { width: 16px; height: 16px; }

    /* Remember / forgot row */
    .options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #6b7280;
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 16px; height: 16px;
      padding: 0;
      accent-color: #2563eb;
      border-radius: 4px;
      cursor: pointer;
    }

    .forgot { font-size: 13px; color: #2563eb; text-decoration: none; font-weight: 500; }
    .forgot:hover { text-decoration: underline; }

    /* Submit */
    button.submit {
      width: 100%;
      padding: 13px;
      background: #2563eb;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(37,99,235,0.35);
      margin-bottom: 20px;
    }

    button.submit:hover { background: #1d4ed8; }
    button.submit:active { transform: scale(0.99); }

    button.submit.loading .btn-text { opacity: 0; }
    button.submit.loading::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    .footer-txt {
      text-align: center;
      font-size: 13px;
      color: #9ca3af;
    }

    .footer-txt a { color: #2563eb; text-decoration: none; font-weight: 600; }
    .footer-txt a:hover { text-decoration: underline; }

    /* Message */
    .message {
      display: none;
      padding: 10px 13px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
    }
    .message.error   { display: block; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    .message.success { display: block; background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }

    /* ── RIGHT panel ── */
    .right {
      width: 420px;
      background: linear-gradient(145deg, #1d4ed8 0%, #2563eb 50%, #3b82f6 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    /* Glowing circles */
    .right::before {
      content: '';
      position: absolute;
      width: 380px; height: 380px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      top: 50%; left: 50%;
      transform: translate(-50%, -62%);
    }

    .right::after {
      content: '';
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      top: 50%; left: 50%;
      transform: translate(-50%, -62%);
    }

    /* Floating app icons */
    .apps {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 72%;
      pointer-events: none;
    }

    .app-icon {
      position: absolute;
      width: 54px; height: 54px;
      background: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      font-size: 22px;
      animation: float 4s ease-in-out infinite alternate;
    }

    .app-icon:nth-child(1) { top: 18%; left: 12%; animation-delay: 0s; }
    .app-icon:nth-child(2) { top: 42%; left: 6%;  animation-delay: -1.5s; }
    .app-icon:nth-child(3) { top: 66%; left: 16%; animation-delay: -3s; }

    @keyframes float {
      from { transform: translateY(0px); }
      to   { transform: translateY(-10px); }
    }

    /* Mock UI card */
    .mock-card {
      position: absolute;
      top: 12%;
      right: 8%;
      width: 148px;
      background: white;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
    }

    .mock-bar {
      display: flex; gap: 5px;
      margin-bottom: 10px;
    }

    .mock-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .mock-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .mock-avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .mock-lines { flex: 1; }
    .mock-line { height: 5px; background: #e5e7eb; border-radius: 3px; margin-bottom: 3px; }
    .mock-line.short { width: 60%; }

    /* Right bottom text */
    .right-text { position: relative; z-index: 2; text-align: center; }
    .right-text h3 { font-size: 18px; font-weight: 700; color: white; margin-bottom: 8px; }
    .right-text p  { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.5; }

    .dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 18px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
    }

    .dot.active { background: white; }

    /* Responsive */
    @media (max-width: 700px) {
      .right { display: none; }
      .left  { padding: 36px 28px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- LEFT -->
  <div class="left">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1C9.24 1 7 3.24 7 6v2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6c0-2.76-2.24-5-5-5zm0 2c1.66 0 3 1.34 3 4v2H9V6c0-1.66 1.34-3 3-3zm0 9a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/></svg>
      </div>
      <span class="brand-name">AuthAPI</span>
    </div>

    <h2>Forgot Password?</h2>
    <p class="sub">Enter your email and we'll help you reset your password.</p>

    <div id="message" class="message"></div>

    <div class="field">
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
        </span>
        <input type="email" id="email" placeholder="Email" autocomplete="email">
      </div>
    </div>



    <button class="submit" id="forgotBtn" onclick="forgotPassword()">
      <span class="btn-text">Send Reset Link</span>
    </button>

    <p class="footer-txt">Don't have an account? <a href="register.html">Create an account</a></p>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <!-- Floating app icons -->
    <div class="apps">
      <div class="app-icon">💬</div>
      <div class="app-icon">📷</div>
      <div class="app-icon">🔍</div>
    </div>

    <!-- Mock UI card -->
    <div class="mock-card">
      <div class="mock-bar">
        <div class="mock-dot" style="background:#ff5f57"></div>
        <div class="mock-dot" style="background:#febc2e"></div>
        <div class="mock-dot" style="background:#28c840"></div>
      </div>
      <div class="mock-row">
        <div class="mock-avatar" style="background:#dbeafe"></div>
        <div class="mock-lines"><div class="mock-line"></div><div class="mock-line short"></div></div>
      </div>
      <div class="mock-row">
        <div class="mock-avatar" style="background:#fce7f3"></div>
        <div class="mock-lines"><div class="mock-line"></div><div class="mock-line short"></div></div>
      </div>
      <div class="mock-row" style="margin-bottom:0">
        <div class="mock-avatar" style="background:#dcfce7"></div>
        <div class="mock-lines"><div class="mock-line"></div><div class="mock-line short"></div></div>
      </div>
    </div>

    <!-- Bottom text -->
    <div class="right-text">
      <h3>Connect with every application.</h3>
      <p>Everything you need in an easily<br>customizable dashboard.</p>
      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
<script>
  function togglePw() {}

  function showMessage(text, type) {
    const el = document.getElementById("message");
    el.textContent = text;
    el.className = "message " + type;
  }

  async function forgotPassword() {
    const email = document.getElementById("email").value;
    const btn   = document.getElementById("forgotBtn");

    btn.classList.add("loading");
    btn.disabled = true;

    const response = await fetch(`${API_URL}/forgot-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await response.json();
    btn.classList.remove("loading");
    btn.disabled = false;

    if (response.ok) {
      localStorage.setItem("reset_email", email);
      showMessage("OTP sent! Check your inbox.", "success");
      setTimeout(() => { window.location.href = "reset-password.html"; }, 1500);
    } else {
      showMessage(data.detail || "Something went wrong", "error");
    }
  }
</script>

</body>
</html>
